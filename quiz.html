<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PluggQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-950 min-h-screen">
    <div class="max-w-lg mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-white">Plugg<span class="text-violet-400">Quiz</span></h1>
        </div>

        <!-- Laddning -->
        <div id="loading" class="text-center py-20">
            <div class="animate-spin h-8 w-8 border-4 border-violet-500 border-t-transparent rounded-full mx-auto"></div>
            <p class="text-gray-400 mt-4">Laddar quiz...</p>
        </div>

        <!-- Felmeddelande -->
        <div id="error" class="hidden text-center py-20">
            <p class="text-red-400 text-lg font-medium">Quizet kunde inte hittas.</p>
            <p class="text-gray-500 mt-2">Kontrollera att länken är korrekt.</p>
        </div>

        <!-- Fråga-kort -->
        <div id="question-card" class="hidden">
            <!-- Progress -->
            <div class="mb-4">
                <div class="flex justify-between text-sm text-gray-400 mb-1">
                    <span id="progress-text">Fråga 1 av 10</span>
                    <span id="score-text"></span>
                </div>
                <div class="w-full bg-gray-800 rounded-full h-2">
                    <div id="progress-bar" class="bg-violet-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <!-- Fråga -->
            <div class="bg-gray-900 rounded-2xl border border-gray-800 p-6 mb-4">
                <h2 id="question-text" class="text-lg font-semibold text-white leading-relaxed"></h2>
            </div>

            <!-- Svarsalternativ -->
            <div id="options-container" class="space-y-3"></div>

            <!-- Förklaring (visas vid fel svar) -->
            <div id="explanation-box" class="hidden mt-4 p-4 bg-sky-900/30 border border-sky-700/50 rounded-2xl">
                <p class="text-sm font-medium text-sky-300 mb-1">Förklaring:</p>
                <p id="explanation-text" class="text-sm text-sky-200/80"></p>
            </div>

            <!-- Nästa-knapp -->
            <button
                id="next-btn"
                onclick="nextQuestion()"
                class="hidden mt-4 w-full bg-violet-600 hover:bg-violet-500 text-white font-semibold py-3 px-6 rounded-xl transition-colors duration-200"
            >
                Nästa fråga →
            </button>
        </div>

        <!-- Avslutningsskärm -->
        <div id="completion-screen" class="hidden text-center py-16">
            <div class="mb-6">
                <svg class="mx-auto h-16 w-16 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white">Bra jobbat!</h2>
            <p class="text-gray-400 mt-2">Du har slutfört övningen.</p>
            <p id="final-score" class="text-lg font-semibold text-violet-400 mt-4"></p>
            <div class="mt-6 flex flex-col gap-3">
                <button
                    id="new-questions-btn"
                    onclick="newQuestions()"
                    class="hidden w-full bg-violet-600 hover:bg-violet-500 text-white font-semibold py-3 px-6 rounded-xl transition-colors duration-200"
                >
                    Nya frågor
                </button>
                <button
                    onclick="restartQuiz()"
                    class="w-full bg-gray-800 hover:bg-gray-700 text-gray-300 font-semibold py-3 px-6 rounded-xl transition-colors duration-200"
                >
                    Gör om samma frågor
                </button>
            </div>
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script src="js/quiz.js"></script>
</body>
</html>
